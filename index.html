<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT-Prep | Подготовка к ЕНТ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome для иконок предметов -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-fontawesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Навигация -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-blue-600"><i class="fa-solid fa-graduation-cap mr-2"></i>ENT-Prep</span>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#" class="text-gray-600 hover:text-blue-600 font-medium">Главная</a>
                    <a href="#subjects" class="text-blue-600 font-bold border-b-2 border-blue-600 pb-1">Предметы</a>
                    <a href="#" class="text-gray-600 hover:text-blue-600 font-medium">Пробные тесты</a>
                    <button class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition font-medium">Войти</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Героический блок -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-16 px-4 text-center">
        <div class="max-w-4xl mx-auto">
            <span class="bg-blue-500/30 text-blue-100 text-sm font-semibold px-3 py-1 rounded-full mb-4 inline-block">Формат ЕНТ 2026</span>
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4">Подготовка к ЕНТ на 140 баллов</h1>
            <p class="text-lg md:text-xl mb-8 text-blue-100">Выбирай нужные предметы, смотри видео-разборы и щелкай тесты как орешки.</p>
        </div>
    </header>

    <!-- СЕКЦИЯ ВЫБОРА ПРЕДМЕТОВ -->
    <section id="subjects" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8">
            <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Выбери предмет для подготовки</h2>
            <p class="text-gray-500 mt-1">Все обязательные предметы и профильные дисциплины ЕНТ.</p>
        </div>

        <!-- Кнопки-переключатели предметов (Расширенный список) -->
        <div class="flex flex-wrap gap-2 mb-10">
            <button onclick="filterBySubject('all')" class="subject-btn active-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-blue-600 bg-blue-600 text-white">
                <i class="fa-solid fa-list"></i> Все
            </button>
            <button onclick="filterBySubject('math-lit')" class="subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500">
                <i class="fa-solid fa-calculator text-red-500"></i> Мат. грамотность
            </button>
            <button onclick="filterBySubject('hist-kaz')" class="subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500">
                <i class="fa-solid fa-book-atlas text-amber-600"></i> История Казахстана
            </button>
            <button onclick="filterBySubject('math')" class="subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500">
                <i class="fa-solid fa-square-root-variable text-blue-500"></i> Математика
            </button>
            <button onclick="filterBySubject('physics')" class="subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500">
                <i class="fa-solid fa-atom text-purple-500"></i> Физика
            </button>
            <button onclick="filterBySubject('chemistry')" class="subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500">
                <i class="fa-solid fa-flask text-emerald-500"></i> Химия
            </button>
            <button onclick="filterBySubject('biology')" class="subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500">
                <i class="fa-solid fa-dna text-teal-600"></i> Биология
            </button>
            <button onclick="filterBySubject('geography')" class="subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500">
                <i class="fa-solid fa-earth-americas text-cyan-600"></i> География
            </button>
            <button onclick="filterBySubject('world-hist')" class="subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500">
                <i class="fa-solid fa-landmark text-orange-600"></i> Всемирная история
            </button>
        </div>

        <!-- Сетка курсов / тем -->
        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- JavaScript вставит карточки сюда -->
        </div>
    </section>

    <!-- Модальное окно для видео -->
    <div id="video-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl overflow-hidden max-w-3xl w-full mx-4 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white bg-gray-800/50 hover:bg-gray-800 p-2 rounded-full z-10">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div class="aspect-video bg-black">
                <iframe id="modal-video" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="p-6">
                <h3 id="modal-title" class="text-2xl font-bold mb-2">Название урока</h3>
                <p id="modal-desc" class="text-gray-600">Описание...</p>
            </div>
        </div>
    </div>

    <script>
        // Большая база данных видео-уроков под ЕНТ
        const entCourses = [
            {
                id: 1,
                title: "Текстовые задачи и логика",
                subject: "math-lit",
                subjectName: "Мат. грамотность",
                lessons: 12,
                image: "https://images.unsplash.com/photo-1610824352934-c10d8706f83c?w=500&auto=format&fit=crop&q=60",
                videoUrl: "https://www.youtube.com/embed/gU9U6gT776A",
                description: "Разбор задач на движение, работу, проценты и логику. Секретные лайфхаки для быстрого решения на ЕНТ."
            },
            {
                id: 2,
                title: "Казахстан в период XIX века",
                subject: "hist-kaz",
                subjectName: "История Казахстана",
                lessons: 18,
                image: "https://images.unsplash.com/photo-1461360370896-922624d12aa1?w=500&auto=format&fit=crop&q=60",
                videoUrl: "https://www.youtube.com/embed/pCHYclgD4MI",
                description: "Национально-освободительные восстания (Кенесары Касымов, Исатай и Махамбет). Разбор дат и контекстов."
            },
            {
                id: 3,
                title: "Тригонометрия: Формулы и Уравнения",
                subject: "math",
                subjectName: "Математика (профиль)",
                lessons: 24,
                image: "https://images.unsplash.com/photo-1509228468518-180dd4864904?w=500&auto=format&fit=crop&q=60",
                videoUrl: "https://www.youtube.com/embed/5mE0mFfscB8",
                description: "Всё от тригонометрического круга до отбора корней в сложных уравнениях из профильного ЕНТ."
            },
            {
                id: 4,
                title: "Кинематика и Законы Ньютона",
                subject: "physics",
                subjectName: "Физика",
                lessons: 15,
                image: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=500&auto=format&fit=crop&q=60",
                videoUrl: "https://www.youtube.com/embed/8-Psh_1c-0c",
                description: "Разбираем векторы, ускорение, силы в природе и алгоритмы решения задач на динамику."
            },
            {
                id: 5,
                title: "Органическая химия: Углеводороды",
                subject: "chemistry",
                subjectName: "Химия",
                lessons: 20,
                image: "https://images.unsplash.com/photo-1532187863486-abf9d39d6618?w=500&auto=format&fit=crop&q=60",
                videoUrl: "https://www.youtube.com/embed/gXpM26n3q_Q",
                description: "Алканы, алкены, алкины. Номенклатура, химические свойства и цепочки превращений веществ."
            },
            {
                id: 6,
                title: "Генетика и Молекулярная биология",
                subject: "biology",
                subjectName: "Биология",
                lessons: 16,
                image: "https://images.unsplash.com/photo-1530026405186-ed1ea0ac7a63?w=500&auto=format&fit=crop&q=60",
                videoUrl: "https://www.youtube.com/embed/9N4S1qD_eU4",
                description: "Законы Менделя, Моргана, биосинтез белка и решение генетических задач из ЕНТ."
            },
            {
                id: 7,
                title: "Физическая география Земли",
                subject: "geography",
                subjectName: "География",
                lessons: 14,
                image: "https://images.unsplash.com/photo-1524661135-423995f22d0b?w=500&auto=format&fit=crop&q=60",
                videoUrl: "https://www.youtube.com/embed/8rYVnC9_4tY",
                description: "Литосфера, атмосфера, климатические пояса и геохронологическая таблица. То, на чем часто теряют баллы."
            },
            {
                id: 8,
                title: "Эпоха Просвещения и Революции",
                subject: "world-hist",
                subjectName: "Всемирная история",
                lessons: 11,
                image: "https://images.unsplash.com/photo-1562673005-7693bd6d6e54?w=500&auto=format&fit=crop&q=60",
                videoUrl: "https://www.youtube.com/embed/snL1BbeW2M4",
                description: "Разбор ключевых событий Нового времени: Английская и Французская буржуазные революции."
            }
        ];

        // Функция отрисовки карточек
        function renderContent(subjectFilter = 'all') {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = '';

            const filtered = subjectFilter === 'all' ? entCourses : entCourses.filter(c => c.subject === subjectFilter);

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">Курсы по этому предмету скоро добавятся!</div>`;
                return;
            }

            filtered.forEach(course => {
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition flex flex-col">
                        <img class="h-44 w-full object-cover" src="${course.image}" alt="${course.title}">
                        <div class="p-5 flex flex-col flex-grow">
                            <span class="text-xs font-bold uppercase tracking-wide text-blue-600 bg-blue-50 px-2.5 py-1 rounded-md inline-block self-start mb-3">${course.subjectName}</span>
                            <h3 class="text-xl font-bold text-gray-900 mb-2">${course.title}</h3>
                            <p class="text-gray-600 text-sm mb-4 flex-grow">${course.description}</p>
                            <div class="pt-4 border-t border-gray-100 flex justify-between items-center mt-auto">
                                <span class="text-sm font-medium text-gray-500"><i class="fa-regular fa-file-video mr-1 text-blue-500"></i> ${course.lessons} видео</span>
                                <button onclick="openModal(${course.id})" class="text-white bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl text-sm font-medium transition shadow-sm">Смотреть урок</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Логика переключения активных кнопок предметов
        function filterBySubject(subject) {
            renderContent(subject);

            const buttons = document.querySelectorAll('.subject-btn');
            buttons.forEach(btn => {
                if(btn.outerHTML.includes(`'${subject}'`)) {
                    btn.className = "subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-blue-600 bg-blue-600 text-white";
                } else {
                    btn.className = "subject-btn flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium shadow-sm transition text-sm border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500";
                }
            });
        }

        // Функции модального окна для просмотра видео
        window.openModal = function(id) {
            const course = entCourses.find(c => c.id === id);
            if (!course) return;
            document.getElementById('modal-title').innerText = course.title;
            document.getElementById('modal-desc').innerText = course.description;
            document.getElementById('modal-video').src = course.videoUrl;
            const modal = document.getElementById('video-modal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        window.closeModal = function() {
            const modal = document.getElementById('video-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('modal-video').src = ""; // сброс видео при закрытии
            }, 300);
        }

        // Первичный запуск
        renderContent();
    </script>
</body>
</html>
